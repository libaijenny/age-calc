<!doctype html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>保險年齡計算器 - 富邦配色版</title>
  <style>
    :root {
      --fubon-blue: #0088cb;
      --fubon-green: #00b085;
      --fubon-dark-blue: #006699;
      --bg: #f5f9fc;
      --surface: #ffffff;
      --text: #1a1a1a;
      --muted: #667788;
      --line: #d1e1ea;
      --radius: 16px;
      --shadow: 0 10px 30px rgba(0, 136, 203, 0.08);
      --danger: #ef4444;
    }

    * { box-sizing: border-box; font-family: "PingFang TC", "Heiti TC", "Microsoft JhengHei", sans-serif; }
    body { background: var(--bg); color: var(--text); margin: 0; padding: 20px; -webkit-font-smoothing: antialiased; }
    main { max-width: 600px; margin: 0 auto; }
    
    header { text-align: center; margin-bottom: 25px; }
    h1 { font-size: 1.8rem; margin: 8px 0; color: var(--fubon-dark-blue); font-weight: 900; }
    .eyebrow { font-size: 0.75rem; color: var(--fubon-green); font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em; }

    .card { background: var(--surface); padding: 20px; border-radius: var(--radius); box-shadow: var(--shadow); border: 1px solid rgba(209,225,234, 0.5); margin-bottom: 15px; }
    label { display: block; font-weight: 700; margin-bottom: 8px; font-size: 0.95rem; color: var(--text); }
    .help-text { font-size: 0.8rem; color: var(--muted); margin-bottom: 12px; }

    /* 輸入框組樣式 */
    .date-input-group {
      display: flex; align-items: center; gap: 8px;
      border: 2px solid var(--line); border-radius: 12px; padding: 4px 15px;
      transition: all 0.2s;
    }
    .date-input-group:focus-within { border-color: var(--fubon-blue); box-shadow: 0 0 0 4px rgba(0, 136, 203, 0.1); }
    
    input[type="tel"] {
      border: none; outline: none; font-size: 1.2rem; padding: 10px 0; text-align: center;
      background: transparent; color: var(--text);
    }
    #dobY, #rocY { width: 65px; font-weight: bold; }
    #dobM, #dobD, #rocM, #rocD { width: 45px; font-weight: bold; }
    .sep { color: var(--line); font-weight: bold; }

    /* 參數調整樣式 */
    input[type="date"], .custom-select {
      width: 100%; border: 2px solid var(--line); border-radius: 12px; 
      padding: 12px 15px; font-size: 1rem; color: var(--text); font-weight: bold;
      background: #fff;
    }
    .slider-row { display: flex; align-items: center; gap: 15px; margin-top: 5px; }
    input[type="range"] { flex-grow: 1; accent-color: var(--fubon-blue); }
    .param-val { font-weight: 900; color: var(--fubon-blue); font-size: 1.2rem; min-width: 45px; text-align: right; }

    /* 結果區樣式 */
    .res-card.main { 
      background: linear-gradient(135deg, var(--fubon-blue), var(--fubon-green)); 
      color: #ffffff; padding: 25px; text-align: center;
    }
    .res-card.main.over-limit { background: linear-gradient(135deg, var(--danger), #ff6b6b); }
    .res-val-lg { font-size: 4.5rem; font-weight: 900; line-height: 1; margin: 10px 0; display: block; }
    .unit-lg { font-size: 1.2rem; margin-left: 5px; }

    /* 2x2 結果矩陣 */
    .sub-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 15px; }
    .sub-box { padding: 12px; border-radius: 12px; background: #fff; text-align: center; border: 1px solid var(--line); box-shadow: 0 4px 10px rgba(0,0,0,0.02); }
    .sub-box.highlight { border-color: var(--fubon-green); background: #f0fffb; }
    .sub-val { font-size: 1.6rem; font-weight: bold; color: var(--text); display: block; }
    .sub-label { font-size: 0.7rem; color: var(--muted); font-weight: bold; text-transform: uppercase; margin-top: 4px; }

    .detail-text { text-align: center; margin-top: 15px; font-size: 0.85rem; color: var(--muted); }
    .error { color: var(--danger); font-size: 0.85rem; font-weight: bold; margin-top: 10px; text-align: center; min-height: 1.2rem; }

  </style>
</head>
<body>

<main>
  <header>
    <p class="eyebrow">Fubon+ Style Tool</p>
    <h1>保險年齡計算器</h1>
  </header>

  <div class="card">
    <label>民國生日</label>
    <div class="date-input-group">
      <input type="tel" id="rocY" placeholder="YYY" maxlength="3">
      <span class="sep">/</span>
      <input type="tel" id="rocM" placeholder="MM" maxlength="2">
      <span class="sep">/</span>
      <input type="tel" id="rocD" placeholder="DD" maxlength="2">
    </div>

    <div style="text-align: center; color:var(--line); font-weight:bold; margin:10px 0; font-size:0.8rem;">或</div>

    <label>西元生日</label>
    <div class="date-input-group">
      <input type="tel" id="dobY" placeholder="YYYY" maxlength="4">
      <span class="sep">/</span>
      <input type="tel" id="dobM" placeholder="MM" maxlength="2">
      <span class="sep">/</span>
      <input type="tel" id="dobD" placeholder="DD" maxlength="2">
    </div>
  </div>

  <div class="card">
    <label>投保基準日</label>
    <input type="date" id="baseDate">
    
    <label style="margin-top:20px;">自訂進位規則 (滿幾個月加1歲)</label>
    <div class="slider-row">
      <input type="range" id="paramSlider" min="1" max="11" value="6">
      <span class="param-val"><span id="paramDisp">6</span>月</span>
    </div>
    <div id="error" class="error"></div>
  </div>

  <div class="results-section">
    <div class="card res-card main" id="mainResCard">
      <div style="font-size: 0.8rem; font-weight: bold; opacity: 0.9;">保險年齡 (標準6個月法則)</div>
      <span class="res-val-lg" id="insAge">--<span class="unit-lg">歲</span></span>
    </div>

    <div class="sub-grid">
      <div class="sub-box">
        <span class="sub-val" id="actAge">--</span>
        <span class="sub-label">實際足歲</span>
      </div>
      <div class="sub-box highlight">
        <span class="sub-val" id="customAge">--</span>
        <span class="sub-label">自訂規則年齡</span>
      </div>
      <div class="sub-box">
        <span class="sub-val" id="remMonth">--</span>
        <span class="sub-label">現在月數</span>
      </div>
      <div class="sub-box">
        <span class="sub-val" id="remDay">--</span>
        <span class="sub-label">現在天數</span>
      </div>
    </div>
    <div class="detail-text" id="detailText">請輸入完整日期進行試算</div>
  </div>
</main>

<script>
  const rocInputs = { Y: document.getElementById('rocY'), M: document.getElementById('rocM'), D: document.getElementById('rocD') };
  const dobInputs = { Y: document.getElementById('dobY'), M: document.getElementById('dobM'), D: document.getElementById('dobD') };
  const baseDateInp = document.getElementById('baseDate');
  const paramSlider = document.getElementById('paramSlider');
  const paramDisp = document.getElementById('paramDisp');
  const errorEl = document.getElementById('error');
  const mainResCard = document.getElementById('mainResCard');

  // 初始化今天日期
  baseDateInp.value = new Date().toISOString().split('T')[0];

  // 雙向同步邏輯
  function syncRocToDob() {
    const y = parseInt(rocInputs.Y.value);
    if (!y) { dobInputs.Y.value = ''; return; }
    dobInputs.Y.value = y + 1911;
    dobInputs.M.value = rocInputs.M.value;
    dobInputs.D.value = rocInputs.D.value;
  }

  function syncDobToRoc() {
    const y = parseInt(dobInputs.Y.value);
    if (!y || y < 1912) { rocInputs.Y.value = ''; return; }
    rocInputs.Y.value = y - 1911;
    rocInputs.M.value = dobInputs.M.value;
    rocInputs.D.value = dobInputs.D.value;
  }

  function setupBehavior(inputs, syncFn) {
    const arr = [inputs.Y, inputs.M, inputs.D];
    arr.forEach((el, i) => {
      el.addEventListener('input', () => {
        el.value = el.value.replace(/\D/g, '');
        syncFn();
        if (el.value.length >= el.maxLength && arr[i+1]) arr[i+1].focus();
        calculate();
      });
      el.addEventListener('keydown', (e) => {
        if (e.key === 'Backspace' && el.value === '' && arr[i-1]) arr[i-1].focus();
      });
    });
  }

  setupBehavior(rocInputs, syncRocToDob);
  setupBehavior(dobInputs, syncDobToRoc);
  baseDateInp.addEventListener('input', calculate);
  paramSlider.addEventListener('input', () => {
    paramDisp.textContent = paramSlider.value;
    calculate();
  });

  function calculate() {
    errorEl.textContent = "";
    mainResCard.classList.remove('over-limit');

    const y = parseInt(dobInputs.Y.value);
    const m = parseInt(dobInputs.M.value);
    const d = parseInt(dobInputs.D.value);
    const baseVal = baseDateInp.value;
    const threshold = parseInt(paramSlider.value);

    if (!y || !m || !d || !baseVal || dobInputs.Y.value.length < 4) { reset(); return; }

    const birth = new Date(y, m - 1, d);
    const base = new Date(baseVal);

    if (isNaN(birth.getTime()) || birth.getFullYear() !== y || birth.getMonth() !== m - 1 || birth.getDate() !== d) {
      errorEl.textContent = "無效的生日日期"; reset(); return;
    }
    if (base < birth) {
      errorEl.textContent = "基準日不可早於生日"; reset(); return;
    }

    let diffY = base.getFullYear() - birth.getFullYear();
    let diffM = base.getMonth() - birth.getMonth();
    let diffD = base.getDate() - birth.getDate();

    if (diffD < 0) {
      diffM--;
      diffD += new Date(base.getFullYear(), base.getMonth(), 0).getDate();
    }
    if (diffM < 0) {
      diffY--;
      diffM += 12;
    }

    const insAge = diffM >= 6 ? diffY + 1 : diffY;
    const customAge = diffM >= threshold ? diffY + 1 : diffY;

    // 更新介面
    document.getElementById('insAge').innerHTML = `${insAge}<span class="unit-lg">歲</span>`;
    document.getElementById('actAge').textContent = diffY;
    document.getElementById('customAge').textContent = customAge;
    document.getElementById('remMonth').textContent = diffM;
    document.getElementById('remDay').textContent = diffD;
    document.getElementById('detailText').textContent = `實際年歲：${diffY}歲 ${diffM}個月 ${diffD}天`;

    if (insAge > 80) mainResCard.classList.add('over-limit');
  }

  function reset() {
    document.getElementById('insAge').innerHTML = `--<span class="unit-lg">歲</span>`;
    document.getElementById('actAge').textContent = "--";
    document.getElementById('customAge').textContent = "--";
    document.getElementById('remMonth').textContent = "--";
    document.getElementById('remDay').textContent = "--";
    document.getElementById('detailText').textContent = "請輸入完整日期";
  }
</script>

</body>
</html>
